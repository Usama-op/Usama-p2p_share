<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftShare | P2P Chat & Transfer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SwiftShare</h1>
            <p>Direct P2P via Cloudflare & Google ICE</p>
        </header>

        <main>
            <div class="card">
                <label>Your Device ID</label>
                <div class="id-display">
                    <input type="text" id="my-id" readonly placeholder="Generating ID...">
                    <button onclick="copyLink()">Copy Link</button>
                </div>
                <div id="qrcode"></div>
            </div>

            <div class="card">
                <label>Connect to Peer</label>
                <input type="text" id="remote-id" placeholder="Paste ID or scan QR">
                <div class="action-bar">
                    <button class="secondary-btn" onclick="connectToPeer()">Establish Connection</button>
                </div>
            </div>

            <div id="chat-card" class="card" style="display:none">
                <label>Secure Chat</label>
                <div id="chat-box" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-msg" placeholder="Type a message...">
                    <button onclick="sendChat()">Send</button>
                </div>
            </div>

            <div id="file-card" class="card" style="display:none">
                <label>Transfer File</label>
                <input type="file" id="file-input">
                <button class="primary-btn" onclick="sendFile()">Send File</button>
            </div>

            <div id="status-card" class="card">
                <p id="status-text">Status: Initializing...</p>
                <a id="download-btn" class="download-link" style="display:none">Download Received File</a>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
