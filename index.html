<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Share | GitHub Pages</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using the latest PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="box">
        <h2>P2P Secure Transfer</h2>
        
        <div class="status-card">
            <p>Your Connection ID</p>
            <h3 id="myId">Initializing...</h3>
            <button onclick="copyId()" class="secondary-btn">Copy ID</button>
        </div>

        <div class="controls">
            <input id="connectId" placeholder="Paste Peer ID here..." />
            <button onclick="connectPeer()" id="connectBtn">Connect to Peer</button>
        </div>

        <div id="dropZone">
            <div class="dz-content">
                <span class="icon" style="font-size: 2rem;">📂</span>
                <p>Drag files here or <strong>browse</strong></p>
            </div>
            <input type="file" id="fileInput" style="display:none" />
        </div>

        <div id="logContainer">
            <div id="logHeader">Activity Log</div>
            <div id="log"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
