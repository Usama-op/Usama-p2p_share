<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Share | Secure Transfer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Dependencies -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SwiftShare</h1>
            <p>Direct P2P File Transfer</p>
        </header>

        <main>
            <!-- Your ID Section -->
            <div class="card">
                <label>Your ID</label>
                <div class="id-display">
                    <input type="text" id="my-id" readonly placeholder="Generating...">
                    <button onclick="copyId()">Copy</button>
                </div>
                <div id="qrcode"></div>
            </div>

            <!-- Connection Section -->
            <div class="card">
                <label>Send to Peer</label>
                <input type="text" id="remote-id" placeholder="Paste Recipient ID">
                <input type="file" id="file-input">
                <button class="primary-btn" onclick="sendFile()">Send File</button>
            </div>

            <!-- Status Indicator -->
            <div id="status-card" class="card">
                <p id="status-text">Status: Ready</p>
                <a id="download-btn" class="download-link" style="display:none">Download Received File</a>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
