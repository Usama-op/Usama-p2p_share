<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#111827">
  <title>WebRTC File Share</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
<div class="bg-gray-800 p-6 rounded-2xl w-full max-w-lg shadow-lg">
  <h1 class="text-3xl font-bold text-center mb-5">WebRTC File Share</h1>
  <input id="roomId" class="w-full p-3 rounded bg-gray-700 mb-3" placeholder="Room ID" />
  <div class="flex gap-3 mb-3">
    <button id="createBtn" class="flex-1 bg-green-600 p-3 rounded hover:bg-green-700">Create Room</button>
    <button id="joinBtn" class="flex-1 bg-blue-600 p-3 rounded hover:bg-blue-700">Join Room</button>
  </div>
  <input type="file" id="fileInput" class="w-full p-3 rounded bg-gray-700 mb-3" />
  <button id="sendBtn" class="w-full bg-purple-600 p-3 rounded hover:bg-purple-700">Send File</button>
  <div class="mt-5">
    <div class="w-full bg-gray-700 h-4 rounded-full overflow-hidden">
      <div id="progressBar" class="bg-green-500 h-full transition-all duration-200" style="width:0%"></div>
    </div>
  </div>
  <p id="status" class="mt-4 text-center text-yellow-300">Disconnected</p>
  <a id="downloadLink" class="hidden mt-5 block bg-green-500 p-3 rounded text-center hover:bg-green-600">Download</a>
</div>
<script>
if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').catch(() => {});
}
</script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
