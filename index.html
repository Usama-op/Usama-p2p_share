<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P FileShare - created by usama</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
</head>
<body>
<div class="premium-bg"></div>
<main class="main">
<h1 class="heading">P2P FileShare<small>created by usama</small></h1>
  <button id="mute-btn" class="mute-btn" title="Toggle Mute">
    <svg id="mute-icon" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
      <path d="M3 9v6h4l5 5V4L7 1v5H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>
  
  <div class="liquid-glass" id="liquid-glass">
    <div class="liquid-glass--bend"></div>
    <div class="liquid-glass--face"></div>
    <div class="liquid-glass--edge"></div>
    
    <div class="liquid-glass__menus" id="glass-menus">
      <!-- Mode Switch Buttons -->
      <div id="mode-buttons">
      <button class="liquid-glass__link link-sender glass-mode-link" data-mode="sender">
        <svg viewBox="0 0 24 24" class="liquid-glass__icon" fill="#fff">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93s3.06-7.44 7-7.93V17.93zm2-13.86c-3.94.49-7 3.85-7 7.93s3.06 7.44 7 7.93V4.07z"/>
        </svg>
        <span class="link-label">Sender</span>
      </button>
      <button class="liquid-glass__link link-receiver glass-mode-link" data-mode="receiver">
        <svg viewBox="0 0 24 24" class="liquid-glass__icon" fill="#fff">
          <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/>
        </svg>
        <span class="link-label">Receiver</span>
      </button>
      </div>
      
      <!-- Sender Content -->
      <div class="glass-panel hidden" id="sender-panel">
        <div class="connection-status">
          <span class="status-dot" id="sender-status-dot"></span>
          <span id="sender-status-text">Waiting for receiver...</span>
        </div>

        <div class="glass-key-section">
          <button id="generate-key-btn" class="glass-btn">Generate Share Key</button>
          <div id="key-display" class="glass-key-display hidden">
            <span id="room-key"></span>
            <button id="copy-key-btn" class="glass-btn">Copy</button>
            <div id="qrcode" class="glass-qrcode"></div>
          </div>
        </div>
        <div id="drop-zone" class="glass-drop-zone">
          <p>Drag & drop files</p>
          <input type="file" id="file-input" multiple accept="*">
        </div>
        <div id="peers-section" class="glass-peers hidden">
          Receivers: <span id="peer-count">0</span>
          <button id="start-transfer-btn" class="glass-btn hidden">Start</button>
        </div>
        <div id="transfer-status" class="glass-status hidden">
          <div id="sender-progress"></div>
        </div>
        <button class="glass-btn back-btn" data-action="back">← Back</button>
      </div>
      
      <!-- Receiver Content -->
      <div class="glass-panel hidden" id="receiver-panel">
        <div class="connection-status">
          <span class="status-dot" id="receiver-status-dot"></span>
          <span id="receiver-status-text">Not connected</span>
        </div>

        <input type="text" id="join-key-input" class="glass-input" placeholder="Enter key">
        <button id="join-key-btn" class="glass-btn">Join</button>
        <div id="receiver-status" class="glass-status hidden">
          <div id="receiver-progress"></div>
          <div id="download-links"></div>
        </div>
        <button class="glass-btn back-btn" data-action="back">← Back</button>
      </div>
    </div>
  </div>
</main>

<div class="app-subtitle">Click to expand • QR supports unlimited receivers</div>

<svg style="display: none" xmlns="http://www.w3.org/2000/svg">
  <filter id="glass-blur" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox">
    <feTurbulence type="fractalNoise" baseFrequency="0.003 0.007" numOctaves="1" result="turbulence" />
    <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="200" xChannelSelector="R" yChannelSelector="G" />
  </filter>
</svg>

<script src="app.js"></script>
