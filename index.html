<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftShare Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="app-container">
<h1>SwiftShare Pro</h1>
<p>Public P2P File Sharing</p>

<input id="my-id" readonly placeholder="Generating ID...">
<button onclick="copyLink()">Copy Link</button>
<div id="qrcode"></div>

<input id="remote-id" placeholder="Enter peer ID">
<button onclick="connectToPeer()">Connect</button>

<div id="chat-box"></div>
<input id="chat-msg" placeholder="Message">
<button onclick="sendChat()">Send</button>

<input type="file" id="file-input">
<button onclick="sendFile()">Send File</button>

<a id="download-btn" style="display:none">Download</a>
<p id="status-text">Status: Loading...</p>

<p style="font-size:12px;color:gray;">
⚠️ Works best on Chrome. Some networks may block P2P.
</p>
</div>
<script src="script.js"></script>
</body>
</html>
