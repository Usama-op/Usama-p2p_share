<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Direct Share</title>
    <link rel="stylesheet" href="style.css">
    <!-- PeerJS Library -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="glass-card">
            <header>
                <div class="logo">🚀 P2P Share</div>
                <div id="connectionStatus" class="status-indicator">Initializing...</div>
            </header>

            <section class="identity-box">
                <label>Your Share ID</label>
                <div class="id-row">
                    <h2 id="myId">---</h2>
                    <button id="copyIdBtn" onclick="copyMyId()">Copy</button>
                </div>
            </section>

            <section class="action-box">
                <div class="input-group">
                    <input type="text" id="remoteIdInput" placeholder="Paste Peer ID here...">
                    <button id="connectBtn" onclick="startConnection()">Connect</button>
                </div>
            </section>

            <section id="transferSection" class="transfer-box hidden">
                <div id="dropZone">
                    <div class="dz-content">
                        <span class="icon">📁</span>
                        <p>Drop file here or click to browse</p>
                    </div>
                    <input type="file" id="fileInput" hidden>
                </div>

                <div id="progressWrapper" class="progress-container hidden">
                    <div class="progress-meta">
                        <span id="progressFileName">file.txt</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill"></div>
                    </div>
                </div>
            </section>

            <footer class="log-footer">
                <div class="log-title">Activity Feed</div>
                <div id="activityLog"></div>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
